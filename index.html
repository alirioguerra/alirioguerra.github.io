<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <title>Alírio Guerra - Desenvolvedor javascript sênior</title>
  </head>
  <body>
    <main>
      <section class="container">
        <div class="lang-toggle">
          <a data-lang="pt" href="#">PT</a>
          <a data-lang="en" href="#">EN</a>
        </div>
        <div class="content">
          <h1 id="name">Alírio Guerra</h1>
          <p id="role">Desenvolvedor javascript sênior</p>
        </div>
        <div class="footer">
          <a href="https://www.linkedin.com/in/alirioguerra/" target="_blank">
            Linkedin
          </a>
          <a href="mailto:alirioguerra.92@gmail.com">E-mail</a>
        </div>
      </section>
    </main>
  </body>
</html>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #fffbff;
    font-family: "Maven Pro", serif;
    font-optical-sizing: auto;
    padding: 40px;
    height: 100vh;
    color: #000;
  }

  .lang-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 16px;
  }

  .container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    height: 90vh;
    background-image: linear-gradient(135deg, #667eea, #764ba2, #537895);
    background-size: 400% 400%;
    animation: gradientAnimation 10s ease infinite;
    border-radius: 10px;
    padding: 20px;
    color: #fffbff;
  }

  h1 {
    font-size: 10rem;
    margin-bottom: 16px;
  }

  p {
    font-size: 2rem;
    margin-bottom: 32px;
  }

  a {
    color: #fff;
    text-decoration: none;
    font-size: 18px;
  }

  .footer {
    position: absolute;
    bottom: 20px;
    display: flex;
    gap: 16px;
  }

  a:hover {
    text-decoration: underline;
  }

  @media (max-width: 768px) {
    body {
      padding: 20px;
    }

    .container {
      height: 95dvh;
    }

    h1 {
      font-size: 6rem;
    }
    p {
      font-size: 1.5rem;
    }
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 4rem;
    }
    p {
      font-size: 1.2rem;
    }
  }

  @keyframes gradientAnimation {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* Dark Mode Styles */
  @media (prefers-color-scheme: dark) {
    body {
      background-color: #1a1a1a;
      color: #fff;
    }

    .container {
      background-image: linear-gradient(135deg, #232526, #414345, #000000);
      color: #dcdcdc;
    }

    a {
      color: #cfcfcf;
    }

    a:hover {
      color: #ffffff;
    }
  }
</style>

<script>
  const langToggle = document.querySelectorAll(".lang-toggle a");
  const role = document.getElementById("role");

  function setLanguage(lang) {
    if (lang === "pt") {
      role.textContent = "Desenvolvedor javascript sênior";
    } else if (lang === "en") {
      role.textContent = "Senior javascript developer";
    } else {
      role.textContent = "Senior javascript developer";
    }
  }

  const systemLang = navigator.language || navigator.userLanguage;
  if (systemLang.startsWith("pt")) {
    setLanguage("pt");
  } else {
    setLanguage("en");
  }

  langToggle.forEach((link) => {
    link.addEventListener("click", (e) => {
      e.preventDefault();
      const lang = link.dataset.lang;
      setLanguage(lang);
    });
  });
</script>
